<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Div Guy — EP 02 · Login Page</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #030507;
  --green:    #00ff9d;
  --green2:   #00cc7a;
  --green-dim:#003d25;
  --red:      #ff4d4d;
  --white:    #e8f0ea;
  --muted:    #3a4a3e;
  --card:     rgba(5, 15, 10, 0.85);
  --border:   rgba(0,255,157,0.15);
  --input-bg: rgba(0,255,157,0.03);
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  color: var(--white);
}

/* ── MATRIX RAIN CANVAS ── */
#matrix {
  position: fixed; inset: 0;
  z-index: 0; opacity: 0.18;
}

/* ── SCANLINES ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
  );
  pointer-events: none; z-index: 1;
}

/* ── VIGNETTE ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.85) 100%
  );
  pointer-events: none; z-index: 1;
}

/* ── MAIN LAYOUT ── */
.page {
  position: relative; z-index: 2;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2.8rem 2.5rem;
  width: 100%; max-width: 420px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px rgba(0,255,157,0.05),
    0 0 60px rgba(0,255,157,0.06),
    0 40px 80px rgba(0,0,0,0.6);
  animation: cardIn 0.7s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(30px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* top bar dots */
.card-topbar {
  display: flex; align-items: center; gap: 0.4rem;
  margin-bottom: 2rem;
}
.dot-r { width:10px;height:10px;border-radius:50%;background:#ff5f57; }
.dot-y { width:10px;height:10px;border-radius:50%;background:#febc2e; }
.dot-g { width:10px;height:10px;border-radius:50%;background:#28c840; }
.topbar-title {
  margin-left: auto;
  font-size: 0.6rem; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase;
}

/* ── HEADER ── */
.card-header { margin-bottom: 2rem; }
.card-label {
  font-size: 0.62rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--green);
  margin-bottom: 0.5rem;
  animation: fadeUp 0.5s 0.3s both;
}
.card-title {
  font-size: 1.6rem; font-weight: 800;
  line-height: 1.1; letter-spacing: -0.02em;
  animation: fadeUp 0.5s 0.4s both;
}
.card-title span { color: var(--green); }
.card-sub {
  font-size: 0.72rem; color: var(--muted);
  margin-top: 0.5rem; line-height: 1.5;
  animation: fadeUp 0.5s 0.5s both;
}

/* ── FORM ── */
.form { display: flex; flex-direction: column; gap: 1.2rem; }

.field { display: flex; flex-direction: column; gap: 0.4rem; }
.field-label {
  font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted);
  transition: color 0.3s;
}
.field:focus-within .field-label { color: var(--green); }

.input-wrap {
  position: relative;
  border: 1px solid var(--muted);
  border-radius: 3px;
  background: var(--input-bg);
  transition: all 0.3s ease;
  overflow: hidden;
}
/* animated green line on focus */
.input-wrap::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  width: 0; height: 2px;
  background: var(--green);
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px var(--green);
}
.input-wrap:focus-within {
  border-color: rgba(0,255,157,0.4);
  background: rgba(0,255,157,0.05);
  box-shadow: 0 0 0 3px rgba(0,255,157,0.07),
              inset 0 0 20px rgba(0,255,157,0.03);
}
.input-wrap:focus-within::after { width: 100%; }

.input-prefix {
  position: absolute; left: 0.9rem; top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem; color: var(--muted);
  pointer-events: none;
  transition: color 0.3s;
}
.input-wrap:focus-within .input-prefix { color: var(--green); }

input[type="text"],
input[type="password"],
input[type="email"] {
  width: 100%; padding: 0.85rem 0.9rem 0.85rem 2rem;
  background: transparent; border: none; outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; color: var(--white);
  letter-spacing: 0.05em;
}
input::placeholder { color: rgba(255,255,255,0.12); }
input[type="password"] { letter-spacing: 0.15em; }

.toggle-pw {
  position: absolute; right: 0.9rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 0.75rem;
  padding: 0.2rem; transition: color 0.2s;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.toggle-pw:hover { color: var(--green); }

/* ── EXTRAS ── */
.form-extras {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.65rem;
}
.remember {
  display: flex; align-items: center; gap: 0.4rem;
  color: var(--muted); cursor: pointer;
}
.remember input[type="checkbox"] {
  width: 12px; height: 12px; padding: 0;
  accent-color: var(--green);
  cursor: pointer;
}
.forgot { color: var(--muted); text-decoration: none; transition: color 0.2s; }
.forgot:hover { color: var(--green); }

/* ── SUBMIT ── */
.btn-submit {
  width: 100%; padding: 0.9rem;
  background: var(--green); color: var(--bg);
  border: none; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 800;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.25s;
}
.btn-submit::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-submit:hover { background: var(--green2); box-shadow: 0 0 24px rgba(0,255,157,0.4); }
.btn-submit:hover::before { transform: translateX(100%); }
.btn-submit:active { transform: scale(0.98); }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 0.8rem;
  font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: var(--muted); opacity: 0.3;
}

/* ── SIGNUP LINK ── */
.signup-line {
  text-align: center; font-size: 0.68rem; color: var(--muted);
}
.signup-line a { color: var(--green); text-decoration: none; transition: opacity 0.2s; }
.signup-line a:hover { opacity: 0.7; }

/* ── STATUS MSG ── */
.status {
  font-size: 0.68rem; letter-spacing: 0.1em;
  padding: 0.6rem 0.8rem; border-radius: 3px;
  display: none; align-items: center; gap: 0.5rem;
}
.status.success { display:flex; background:rgba(0,255,157,0.08); border:1px solid rgba(0,255,157,0.2); color:var(--green); }
.status.error   { display:flex; background:rgba(255,77,77,0.08);  border:1px solid rgba(255,77,77,0.2);  color:var(--red); }

/* ── DIV GUY BUBBLE ── */
.divguy-hint {
  position: fixed; bottom: 2rem; left: 2rem;
  display: flex; align-items: flex-end; gap: 0.8rem;
  z-index: 10; animation: fadeUp 0.6s 1s both;
}
.divguy-img { width: 70px; filter: drop-shadow(0 0 10px rgba(0,255,157,0.2)); animation: bob 3s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.divguy-bubble {
  background: rgba(5,15,10,0.9);
  border: 1px solid var(--border);
  border-radius: 10px 10px 10px 2px;
  padding: 0.7rem 0.9rem;
  font-size: 0.68rem; line-height: 1.5;
  color: var(--white); max-width: 200px;
  box-shadow: 0 0 20px rgba(0,255,157,0.1);
  position: relative;
}
.divguy-bubble .g { color: var(--green); font-weight: 700; }
.bubble-tip {
  position: absolute; bottom: -8px; left: 12px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-top: 8px solid var(--border);
}
.bubble-tip::after {
  content: '';
  position: absolute; top: -9px; left: -7px;
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-top: 7px solid rgba(5,15,10,0.9);
}

/* ── NAV ── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 10; padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,255,157,0.06);
  background: rgba(3,5,7,0.7); backdrop-filter: blur(10px);
}
.nav-logo { font-size: 0.85rem; font-weight: 800; color: var(--white); text-decoration: none; }
.nav-logo span { color: var(--green); }
.nav-links-row { display: flex; gap: 1.5rem; }
.nav-links-row a {
  font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); text-decoration: none; transition: color 0.2s;
}
.nav-links-row a:hover { color: var(--green); }

/* ── EP BADGE ── */
.ep-pill {
  position: fixed; top: 4.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--green); border: 1px solid var(--border);
  padding: 0.3rem 1rem; border-radius: 100px;
  background: rgba(0,255,157,0.04);
  z-index: 10; animation: fadeUp 0.5s 0.2s both;
  white-space: nowrap;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ── RESPONSIVE ── */
@media(max-width:500px){
  .card { padding: 2rem 1.5rem; }
  .divguy-hint { bottom:1rem; left:1rem; }
  .divguy-img { width:55px; }
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<!-- NAV -->
<nav class="topnav">
  <a href="index.html" class="nav-logo">&lt;<span>Div</span>Guy /&gt;</a>
  <div class="nav-links-row">
    <a href="index.html">← Home</a>
    <a href="divguy-intro.html">EP 01</a>
  </div>
</nav>

<div class="ep-pill">✦ Episode 02 · Login Page</div>

<!-- MAIN -->
<div class="page">
  <div class="card">

    <!-- Top bar -->
    <div class="card-topbar">
      <div class="dot-r"></div>
      <div class="dot-y"></div>
      <div class="dot-g"></div>
      <span class="topbar-title"></span>
    </div>

    <!-- Header -->
    <div class="card-header">
      <div class="card-label">// access terminal</div>
      <div class="card-title">Welcome<br>back, <span>Div.</span></div>
      <div class="card-sub">Enter credentials to continue →</div>
    </div>

    <!-- Form -->
    <div class="form">

      <!-- Status -->
      <div class="status" id="status"></div>

      <!-- Username -->
      <div class="field" style="animation: fadeUp 0.5s 0.5s both; opacity:0;">
        <label class="field-label">// Username</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="text" id="username" placeholder="enter_username" autocomplete="off" />
        </div>
      </div>

      <!-- Password -->
      <div class="field" style="animation: fadeUp 0.5s 0.65s both; opacity:0;">
        <label class="field-label">// password</label>
        <div class="input-wrap">
          <span class="input-prefix">🔑</span>
          <input type="password" id="password" placeholder="••••••••••" />
          <button class="toggle-pw" id="togglePw" type="button">show</button>
        </div>
      </div>

      <!-- Extras -->
      <div class="form-extras" style="animation: fadeUp 0.5s 0.75s both; opacity:0;">
        <label class="remember">
          <input type="checkbox" /> Remember Me
        </label>
        <a href="#" class="forgot">forgot_pass?</a>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submitBtn" style="animation: fadeUp 0.5s 0.85s both; opacity:0;"
        onclick="handleLogin()">
        login
      </button>

      <!-- Divider -->
      <div class="divider" style="animation: fadeUp 0.5s 0.95s both; opacity:0;">or</div>

      <!-- Signup -->
      <div class="signup-line" style="animation: fadeUp 0.5s 1s both; opacity:0;">
        new here? <a href="#">create_account →</a>
      </div>

    </div>
  </div>
</div>

<!-- DIV GUY HINT -->
<div class="divguy-hint">
  <div>
    <div class="divguy-bubble">
      <span class="g">input:focus</span> triggers<br>
      that green glow ✨<br>
      Try clicking a field!
      <div class="bubble-tip"></div>
    </div>
  </div>
  <img src="insta_2.png" class="divguy-img" alt="The Div Guy" />
</div>

<script>
// ── MATRIX RAIN ──
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  init();
});

const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノABCDEF{}[]<>/\\;:'.split('');
const fontSize = 13;
let cols, drops;

function init() {
  cols = Math.floor(canvas.width / fontSize);
  drops = Array(cols).fill(1);
}
init();

function drawMatrix() {
  ctx.fillStyle = 'rgba(3,5,7,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff9d';
  ctx.font = fontSize + 'px JetBrains Mono, monospace';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.globalAlpha = Math.random() * 0.8 + 0.2;
    ctx.fillText(char, i * fontSize, y * fontSize);
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
  ctx.globalAlpha = 1;
}
setInterval(drawMatrix, 45);

// ── SHOW/HIDE PASSWORD ──
const pwInput  = document.getElementById('password');
const togglePw = document.getElementById('togglePw');
togglePw.addEventListener('click', () => {
  const isHidden = pwInput.type === 'password';
  pwInput.type      = isHidden ? 'text' : 'password';
  togglePw.textContent = isHidden ? 'hide' : 'show';
});

// ── LOGIN HANDLER ──
function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  const status = document.getElementById('status');
  const btn  = document.getElementById('submitBtn');

  status.className = 'status';
  status.style.display = 'none';

  if (!user || !pass) {
    status.className = 'status error';
    status.innerHTML = '⚠ fields cannot be empty';
    status.style.display = 'flex';
    return;
  }

  // Loading state
  btn.textContent = '...authenticating';
  btn.disabled = true;

  setTimeout(() => {
    btn.textContent = './login --execute';
    btn.disabled = false;
    status.className = 'status success';
    status.innerHTML = '✓ access granted — welcome, ' + user;
    status.style.display = 'flex';
  }, 1800);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// Cycle Div Guy bubble tips
const tips = [
  `<span class="g">input:focus</span> triggers<br>that green glow ✨<br>Try clicking a field!`,
  `The <span class="g">::after</span> trick<br>makes that sliding<br>green line appear 🔥`,
  `<span class="g">backdrop-filter</span><br>gives the card that<br>frosted glass look 😎`,
  `<span class="g">transition: all 0.3s</span><br>makes every hover<br>feel smooth! ⚡`,
];
let tipIdx = 0;
const bubbleEl = document.querySelector('.divguy-bubble');
setInterval(() => {
  tipIdx = (tipIdx + 1) % tips.length;
  bubbleEl.style.opacity = '0';
  bubbleEl.style.transform = 'translateY(6px)';
  bubbleEl.style.transition = 'all 0.3s';
  setTimeout(() => {
    bubbleEl.innerHTML = tips[tipIdx] + '<div class="bubble-tip"></div>';
    bubbleEl.style.opacity = '1';
    bubbleEl.style.transform = 'translateY(0)';
  }, 300);
}, 4000);
</script>
</body>
</html>
